<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yubus | Reset Password</title>
    <link rel="stylesheet" href="reset-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <main class="reset-page">
        <section class="reset-shell">
            <a class="back-link" href="login.html">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Login</span>
            </a>

            <div class="reset-card">
                <span class="reset-kicker">Forgot Password</span>
                <h1>Reset your password</h1>
                <p class="reset-copy">Send a real OTP to your email, then enter it with your new password to reset access.</p>

                <form id="resetPasswordForm" class="reset-form">
                    <div class="field-group">
                        <label for="resetEmail">Registered Gmail</label>
                        <input id="resetEmail" type="email" placeholder="Enter your registered Gmail" required>
                    </div>

                    <div class="generate-row">
                        <button id="sendResetOtpBtn" class="outline-btn" type="button">Send OTP</button>
                        <span class="hint-text">OTP is valid for 5 minutes.</span>
                    </div>

                    <div class="field-group">
                        <label for="resetOtp">Email OTP</label>
                        <input id="resetOtp" type="text" placeholder="Enter the 6-digit OTP" maxlength="6" inputmode="numeric" required>
                    </div>

                    <div class="field-group">
                        <label for="newPassword">New Password</label>
                        <input id="newPassword" type="password" placeholder="Enter new password" required>
                    </div>

                    <div class="field-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" type="password" placeholder="Confirm new password" required>
                    </div>

                    <button class="primary-btn" type="submit">Reset Password</button>
                    <p id="resetStatus" class="status-text" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <script src="reset-password.js?v=20260320-otp-port-fallback-v2"></script>
</body>
</html>
