<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yubus | OTP</title>
    <link rel="stylesheet" href="otp.css">
</head>
<body>

<div class="otp-card">
    <h2>OTP Verification</h2>
    <p>Enter the 6-digit OTP</p>

    <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
    </div>

    <button class="otp-primary-btn" onclick="verifyOTP()">Verify OTP</button>
    <button type="button" class="otp-secondary-btn" id="resendOtpBtn">Resend OTP</button>
    <p class="otp-status" id="resendOtpStatus">Didn't receive it? Tap resend to get a new OTP.</p>
    <button type="button" class="otp-back-btn" id="otpBackBtn">Back to Login</button>
</div>

    <script src="api-config.js"></script>
    <script src="otp.js?v=20260320-otp-port-fallback-v2"></script>
</body>
</html>
